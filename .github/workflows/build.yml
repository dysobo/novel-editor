name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Get version
        id: version
        shell: bash
        run: echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Build exe
        run: |
          pyinstaller --noconfirm --onefile --windowed --name "novel-editor" --add-data "resources;resources" main.py

      - name: Rename exe
        shell: pwsh
        run: |
          Rename-Item -Path "dist/novel-editor.exe" -NewName "${{ steps.version.outputs.tag }}.novel-editor.exe"

      - name: Upload to Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = "${{ steps.version.outputs.tag }}"
          gh release upload $tag "dist/${tag}.novel-editor.exe" --clobber
