name: Build & Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build exe
        run: |
          pyinstaller --noconfirm --onefile --windowed --name "小说编辑器" --add-data "resources;resources" main.py

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/小说编辑器.exe
